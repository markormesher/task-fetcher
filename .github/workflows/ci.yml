name: "CI"

on:
  - "push"

jobs:
  imgbuild:
    runs-on: "ubuntu-latest"
    permissions:
      packages: "write"
    steps:
      - uses: "markormesher/ci-resources/setup@v0.6.0"
      - run: |
          buildah login ghcr.io -u "${{ github.actor }}" -p "${{ github.token }}"
      - run: "./task imgrefs"
      - run: "./task imgbuild"
      - run: "./task imgpush"

  ci-all:
    runs-on: "ubuntu-latest"
    needs:
      - "imgbuild"
    container:
      image: "docker.io/busybox:1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d"
    steps:
      - run: "echo Done"
