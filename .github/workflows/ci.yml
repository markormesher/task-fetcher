name: "CI"

on:
  - "push"

jobs:
  debug:
    runs-on: "ubuntu-latest"
    container:
      image: "docker.io/busybox:1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d"
    steps:
      - uses: "markormesher/ci-resources/setup@129185d2af2a2fda1067174beada43cd11601450"
      - run: "task --list-all"

  imgbuild:
    runs-on: "docker"
    needs:
      - "debug"
    container:
      image: "quay.io/buildah/stable"
    steps:
      - uses: "markormesher/ci-resources/setup@129185d2af2a2fda1067174beada43cd11601450"
      - run: "task imgrefs"
      - run: "task imgbuild"
      - run: "task imgpush"

  ci-all:
    runs-on: "docker"
    needs:
      - "debug"
      - "imgbuild"
    container:
      image: "docker.io/busybox:1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d"
    steps:
      - run: "echo Done"
